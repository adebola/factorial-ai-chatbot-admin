<div class="callback-container">
  <mat-card class="callback-card">
    <!-- Processing -->
    <div *ngIf="isProcessing && !error" class="callback-processing">
      <mat-spinner diameter="60"></mat-spinner>
      <h2>Authenticating...</h2>
      <p>Please wait while we complete your login.</p>
    </div>

    <!-- Error -->
    <div *ngIf="error" class="callback-error">
      <mat-icon color="warn">error</mat-icon>
      <h2>Authentication Failed</h2>
      <p class="error-message">{{ error }}</p>
      <button mat-raised-button color="primary" (click)="retryLogin()">
        <mat-icon>refresh</mat-icon>
        Try Again
      </button>
      <p class="redirect-info">Redirecting to login in 3 seconds...</p>
    </div>
  </mat-card>
</div>
