<div class="payment-list">
  <div class="header-row">
    <mat-form-field appearance="outline">
      <mat-label>Status</mat-label>
      <mat-select [(value)]="statusFilter" (selectionChange)="onFilterChange()">
        <mat-option value="">All</mat-option>
        <mat-option value="completed">Completed</mat-option>
        <mat-option value="pending">Pending</mat-option>
        <mat-option value="failed">Failed</mat-option>
        <mat-option value="refunded">Refunded</mat-option>
      </mat-select>
    </mat-form-field>
    <button mat-raised-button color="primary" (click)="openCreatePaymentDialog()">
      <mat-icon>add</mat-icon>
      Create Manual Payment
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <div *ngIf="loading" class="loading">
        <mat-spinner diameter="50"></mat-spinner>
      </div>

      <table mat-table [dataSource]="dataSource" *ngIf="!loading">
        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef>Amount</th>
          <td mat-cell *matCellDef="let payment">
            {{ formatAmount(payment.amount, payment.currency) }}
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let payment">
            <mat-chip [ngClass]="getStatusColor(payment.status)">{{ payment.status }}</mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="payment_method">
          <th mat-header-cell *matHeaderCellDef>Method</th>
          <td mat-cell *matCellDef="let payment">{{ payment.payment_method }}</td>
        </ng-container>

        <ng-container matColumnDef="payment_date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let payment">
            {{ getPaymentDate(payment) ? (getPaymentDate(payment) | date:'dd/MM/yy') : 'N/A' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let payment">
            <button mat-icon-button [matMenuTriggerFor]="menu">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="viewPaymentDetails(payment)">
                <mat-icon>visibility</mat-icon>
                <span>View Details</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator
        *ngIf="!loading"
        [length]="totalElements"
        [pageSize]="pageSize"
        [pageSizeOptions]="[10, 20, 50]"
        [pageIndex]="pageIndex"
        (page)="onPageChange($event)">
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
